name: Docker Build

on:
  push:
    branches: [ main, develop ]
    tags: [ 'v*' ]
    paths-ignore:
      - '**/__tests__/**'
      - '**/e2e/**'
      - '**/*.md'
      - '.github/workflows/**'
      - 'jest.config.js'
      - 'config/jest/**'
      - 'config/eslint/**'
      - 'config/typescript/**'
      - 'config/playwright/**'
      - '**/__mocks__/**'
  pull_request:
    branches: [ main ]
    paths-ignore:
      - '**/__tests__/**'
      - '**/e2e/**'
      - '**/*.md'
      - '.github/workflows/**'
      - 'jest.config.js'
      - 'config/jest/**'
      - 'config/eslint/**'
      - 'config/typescript/**'
      - 'config/playwright/**'
      - '**/__mocks__/**'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 2  # Needed for changed-files action

      - name: Check for relevant file changes
        id: changed-files
        uses: tj-actions/changed-files@v47
        with:
          files_yaml: |
            src:
              - '!**/__tests__/**'
              - '!**/e2e/**'
              - '!**/*.md'
              - '!.github/workflows/**'
              - '!jest.*.js'
              - '!config/jest/**'
              - '!config/eslint/**'
              - '!config/typescript/**'
              - '!config/playwright/**'
              - '!**/__mocks__/**'
              - '**'

      - name: Output build decision
        run: |
          if [[ "${{ steps.changed-files.outputs.src_any_changed }}" == "true" || ("${{ github.event_name }}" == "push" && "${{ github.ref }}" =~ ^refs/tags/ ) ]]; then
            echo "Building Docker images because relevant files have changed or this is a tag push"
            echo "SHOULD_BUILD=true" >> $GITHUB_ENV
          else
            echo "Skipping Docker build because only test files were changed"
            echo "SHOULD_BUILD=false" >> $GITHUB_ENV
          fi

          # Debug output
          echo "Changed files: ${{ steps.changed-files.outputs.src_all_changed_files }}"
          echo "Any changed: ${{ steps.changed-files.outputs.src_any_changed }}"

      - name: Read version
        id: version
        run: echo "VERSION=$(cat version.txt)" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        if: env.SHOULD_BUILD == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: env.SHOULD_BUILD == 'true' && github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Build and push main application image
      - name: Extract metadata for main app
        if: env.SHOULD_BUILD == 'true'
        id: meta-app
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}/nextjs-app
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=raw,value=${{ steps.version.outputs.VERSION }}
            type=raw,value=latest
            type=sha,format=short

      - name: Build and push main app image
        if: env.SHOULD_BUILD == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./docker/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          load: ${{ github.event_name == 'pull_request' }}
          tags: ${{ steps.meta-app.outputs.tags }}
          labels: ${{ steps.meta-app.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Build and push cleanup service image
      - name: Extract metadata for cleanup service
        if: env.SHOULD_BUILD == 'true'
        id: meta-cleanup
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}/cleanup-service
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=raw,value=${{ steps.version.outputs.VERSION }}
            type=raw,value=latest
            type=sha,format=short

      - name: Build and push cleanup service image
        if: env.SHOULD_BUILD == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./docker/Dockerfile.cleanup
          push: ${{ github.event_name != 'pull_request' }}
          load: ${{ github.event_name == 'pull_request' }}
          tags: ${{ steps.meta-cleanup.outputs.tags }}
          labels: ${{ steps.meta-cleanup.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Test the built images
      - name: Test Docker image permissions
        if: env.SHOULD_BUILD == 'true'
        run: |
          echo "Testing Docker image permissions..."
          
          # Create test uploads directory
          mkdir -p test-uploads
          chmod 755 test-uploads
          
          # Get the first tag from meta-app (tags are newline-separated)
          IMAGE_TAG=$(echo "${{ steps.meta-app.outputs.tags }}" | head -n1)
          echo "Testing image: $IMAGE_TAG"
          
          # Test that entrypoint script exists and works
          echo "Testing entrypoint script..."
          docker run --rm \
            -v "$(pwd)/test-uploads:/app/public/uploads" \
            "$IMAGE_TAG" \
            sh -c "
              test -f /entrypoint.sh && echo '✓ Entrypoint script exists' || (echo '✗ Entrypoint script missing' && exit 1)
              command -v su-exec && echo '✓ su-exec installed' || (echo '✗ su-exec missing' && exit 1)
              touch /app/public/uploads/.test-write && rm /app/public/uploads/.test-write && echo '✓ Write permissions working'
            " || (echo "✗ Permission test failed" && exit 1)
          
          # Cleanup
          rm -rf test-uploads
          echo "✓ Docker image permission tests passed"
