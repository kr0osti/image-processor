name: Docker Integration Test

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'docker/**'
      - '.github/workflows/docker-test.yml'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'docker/**'
      - '.github/workflows/docker-test.yml'

jobs:
  test-docker-permissions:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./docker/Dockerfile
          target: runner
          tags: test-image:latest
          push: false
          load: ${{ github.event_name == 'pull_request' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Create test uploads directory
        run: |
          mkdir -p test-uploads
          chmod 755 test-uploads

      - name: Test entrypoint script and permissions
        run: |
          echo "Testing Docker container with mounted volume..."
          
          # Run container and test entrypoint script
          docker run --rm \
            -v "$(pwd)/test-uploads:/app/public/uploads" \
            test-image:latest \
            sh -c "
              echo 'Checking if entrypoint script exists...'
              test -f /entrypoint.sh && echo 'Entrypoint script found' || (echo 'Entrypoint script missing!' && exit 1)
              
              echo 'Checking if su-exec is installed...'
              command -v su-exec && echo 'su-exec found' || (echo 'su-exec missing!' && exit 1)
              
              echo 'Checking uploads directory permissions...'
              ls -la /app/public/uploads || true
              
              echo 'Testing write permissions...'
              touch /app/public/uploads/.test-write || (echo 'Write test failed!' && exit 1)
              rm -f /app/public/uploads/.test-write
              echo 'Write test passed!'
            "

      - name: Test container runs with correct user
        run: |
          echo "Testing user switching in container..."
          
          # Test that the container switches to user 1001:1001
          USER_INFO=$(docker run --rm test-image:latest sh -c "id")
          echo "User info: $USER_INFO"
          
          if echo "$USER_INFO" | grep -q "uid=1001"; then
            echo "✓ Container runs as user 1001"
          else
            echo "✗ Container does not run as user 1001"
            exit 1
          fi

      - name: Test healthcheck endpoint
        run: |
          echo "Testing container healthcheck..."
          
          # Start container in background
          CONTAINER_ID=$(docker run -d \
            -v "$(pwd)/test-uploads:/app/public/uploads" \
            -p 3000:3000 \
            -e NODE_ENV=production \
            -e NEXT_PUBLIC_SITE_NAME="Test" \
            -e NEXT_PUBLIC_SITE_DESCRIPTION="Test" \
            -e NEXT_PUBLIC_SITE_URL="http://localhost:3000" \
            -e CLEANUP_API_KEY="test-key" \
            test-image:latest)
          
          echo "Container started: $CONTAINER_ID"
          
          # Wait for container to be ready
          echo "Waiting for container to start..."
          sleep 10
          
          # Check if container is still running
          if [ "$(docker inspect -f '{{.State.Running}}' "$CONTAINER_ID")" != "true" ]; then
            echo "✗ Container stopped unexpectedly"
            docker logs "$CONTAINER_ID"
            exit 1
          fi
          
          # Test healthcheck endpoint (if it exists)
          echo "Checking container health..."
          HEALTH_CHECK=$(docker exec "$CONTAINER_ID" sh -c "curl -f http://localhost:3000/api/healthcheck 2>/dev/null || echo 'healthcheck_not_found'")
          echo "Health check response: $HEALTH_CHECK"
          
          # Stop container
          docker stop "$CONTAINER_ID"
          docker rm "$CONTAINER_ID"
          
          echo "✓ Container healthcheck test passed"

      - name: Cleanup
        if: always()
        run: |
          rm -rf test-uploads
          docker image rm test-image:latest || true

  test-docker-compose:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker images
        run: |
          docker build -f docker/Dockerfile --target runner -t ghcr.io/${{ github.repository }}/nextjs-app:test .
          docker build -f docker/Dockerfile.cleanup -t ghcr.io/${{ github.repository }}/cleanup-service:test .

      - name: Create test directories
        run: |
          mkdir -p test-custom-icons test-uploads
          chmod 755 test-custom-icons test-uploads

      - name: Test docker-compose with permissions
        run: |
          cd docker
          
          # Create a test docker-compose file
          cat > docker-compose-test.yml << EOF
          services:
            app:
              image: ghcr.io/${{ github.repository }}/nextjs-app:test
              container_name: nextjs-image-processor-test
              environment:
                - NODE_ENV=production
                - NEXT_PUBLIC_SITE_NAME=Test
                - NEXT_PUBLIC_SITE_DESCRIPTION=Test
                - NEXT_PUBLIC_SITE_URL=http://localhost:3000
                - CLEANUP_API_KEY=test-key
              volumes:
                - ../test-custom-icons:/app/public/custom-icons
                - ../test-uploads:/app/public/uploads
              ports:
                - "3001:3000"
          EOF
          
          # Start services
          docker compose -f docker-compose-test.yml up -d
          
          # Wait for container to start
          sleep 15
          
          # Check if container is running
          if [ "$(docker inspect -f '{{.State.Running}}' "nextjs-image-processor-test")" != "true" ]; then
            echo "✗ Container failed to start"
            docker compose -f docker-compose-test.yml logs
            exit 1
          fi
          
          # Test that container can write to uploads directory
          echo "Testing write permissions in container..."
          docker exec nextjs-image-processor-test sh -c "
            touch /app/public/uploads/.test-write && \
            rm /app/public/uploads/.test-write && \
            echo 'Write test successful'
          " || (echo "✗ Write test failed" && docker compose -f docker-compose-test.yml logs && exit 1)
          
          # Check logs for permission fix messages
          echo "Checking entrypoint logs..."
          docker logs nextjs-image-processor-test | grep -i "permissions fixed" || echo "Note: Permission fix message not found in logs"
          
          # Stop services
          docker compose -f docker-compose-test.yml down

      - name: Cleanup
        if: always()
        run: |
          rm -rf test-custom-icons test-uploads
          docker compose -f docker/docker-compose-test.yml down || true
          docker image rm ghcr.io/${{ github.repository }}/nextjs-app:test || true
          docker image rm ghcr.io/${{ github.repository }}/cleanup-service:test || true
